<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychosis VPN</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Crypto -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>

<body>

<div class="content">
    <div class="container">

        <!-- LOGIN -->
        <div id="loginScreen">
            <div class="logo">
                <h1>Psychosis VPN</h1>
                <p>Premium Access</p>
            </div>

            <div class="error" id="error"></div>

            <div class="form-group">
                <label>Ключ доступа</label>
                <input type="password" id="password" placeholder="Введите ключ">
            </div>

            <button class="button" onclick="openVPN()">Подключиться</button>
        </div>

        <!-- PROFILE -->
        <div id="profileScreen" style="display:none;">
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <h2>Ваш профиль</h2>
            </div>

            <div class="info-card">
                <div class="info-label">Статус</div>
                <div class="info-value status-active">Активен</div>
            </div>

            <div class="info-card">
                <div class="info-label">Подписка до</div>
                <div class="info-value" id="expiryDate"></div>
            </div>

            <div class="info-card">
                <div class="info-label">Серверы</div>
                <div class="info-value" id="serversInfo"></div>
            </div>

            <div class="info-card">
                <div class="info-label">Осталось времени</div>
                <div class="countdown-items">
                    <div class="countdown-item">
                        <span class="countdown-value" id="days">0</span>
                        <span class="countdown-label">дни</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-value" id="hours">0</span>
                        <span class="countdown-label">часы</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-value" id="minutes">0</span>
                        <span class="countdown-label">мин</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-value" id="seconds">0</span>
                        <span class="countdown-label">сек</span>
                    </div>
                </div>
            </div>

            <button class="button button-logout" onclick="logout()">Выйти</button>
        </div>

    </div>
</div>

<script>
const passwords = {
    '9d8f020fdf5d96d55f63e1dcd0fbc4aa4f7ed76452ec607489e00e542eadfe8c': {
        url: 'https://raw.githubusercontent.com/aure1337/krutostvpn/main/test77',
        expireTimestamp: 1775591733,
        servers: 3
    },
  // admin
    '6417d118af2071c929a4232db38fa0ecf58932845343b5e986ae407cb908211e': {
        url: 'https://raw.githubusercontent.com/aure1337/krutostvpn/main/test22',
        expireTimestamp: 1777407200,
        servers: 3
    }
};

let countdownInterval;

function showError(text) {
    const el = document.getElementById('error');
    el.textContent = text;
    el.classList.add('show');
}

function formatDate(ts) {
    return new Date(ts * 1000).toLocaleDateString('ru-RU');
}

function updateCountdown(ts) {
    clearInterval(countdownInterval);

    countdownInterval = setInterval(() => {
        const diff = ts * 1000 - Date.now();

        if (diff <= 0) return;

        const d = Math.floor(diff / 86400000);
        const h = Math.floor(diff / 3600000) % 24;
        const m = Math.floor(diff / 60000) % 60;
        const s = Math.floor(diff / 1000) % 60;

        days.textContent = d;
        hours.textContent = h;
        minutes.textContent = m;
        seconds.textContent = s;
    }, 1000);
}

function openVPN() {
    const pwd = password.value;
    if (!pwd) return showError('Введите ключ');

    const hash = CryptoJS.SHA256(pwd).toString();
    const config = passwords[hash];

    if (!config) {
        password.value = '';
        return showError('Неверный ключ');
    }

    loginScreen.style.display = 'none';
    profileScreen.style.display = 'block';

    expiryDate.textContent = formatDate(config.expireTimestamp);
    serversInfo.textContent = config.servers;

    updateCountdown(config.expireTimestamp);

    setTimeout(() => {
        window.location.href = `happ://subscribe?url=${encodeURIComponent(config.url)}`;
    }, 1000);
}

function logout() {
    clearInterval(countdownInterval);
    profileScreen.style.display = 'none';
    loginScreen.style.display = 'block';
    password.value = '';
}

password.addEventListener('keypress', e => {
    if (e.key === 'Enter') openVPN();
});
</script>

</body>
</html>
