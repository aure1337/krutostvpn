<script>
    // Снежинки
    const canvas = document.getElementById('snowCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const snowflakes = [];
    
    class Snowflake {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height - canvas.height;
            this.radius = Math.random() * 1.5 + 0.5;
            this.opacity = Math.random() * 0.4 + 0.2;
            this.velocityY = Math.random() * 0.8 + 0.3;
            this.velocityX = (Math.random() - 0.5) * 1.5;
        }

        draw() {
            ctx.save();
            ctx.globalAlpha = this.opacity;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        update() {
            this.y += this.velocityY;
            this.x += this.velocityX;

            if (this.y > canvas.height) {
                this.y = -10;
                this.x = Math.random() * canvas.width;
            }

            if (this.x > canvas.width) this.x = 0;
            if (this.x < 0) this.x = canvas.width;
        }
    }

    function createSnowflakes() {
        for (let i = 0; i < 40; i++) {
            snowflakes.push(new Snowflake());
        }
    }

    function animateSnow() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        snowflakes.forEach(flake => {
            flake.update();
            flake.draw();
        });
        requestAnimationFrame(animateSnow);
    }

    createSnowflakes();
    animateSnow();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    // Логика подписок
    const passwords = {
        'a665a45920422f9d417e4867efdc4fb8a04a1f3fff1fa07e998e86f7f7a27ae3': { // 123
            url: 'https://raw.githubusercontent.com/aure1337/krutostvpn/refs/heads/main/test77',
            expireTimestamp: 1775591733,
            servers: 3
        },
        '9f86d081884c7d6b9abdbb3e2ed5c8e9f7d5d5d5c5d5d5d5d5d5d5d5d5d5d5d': { // test
            url: 'https://raw.githubusercontent.com/aure1337/krutostvpn/refs/heads/main/test22',
            expireTimestamp: 1777407200,
            servers: 5
        }
    };

    let countdownInterval;

    function showError(text) {
        const error = document.getElementById('error');
        error.textContent = text;
        error.classList.add('show');
        setTimeout(() => error.classList.remove('show'), 4000);
    }

    function formatDate(timestamp) {
        const date = new Date(timestamp * 1000);
        return date.toLocaleDateString('ru-RU', { 
            day: '2-digit', 
            month: 'long',
            year: 'numeric'
        });
    }

    function updateCountdown(timestamp) {
        if (countdownInterval) clearInterval(countdownInterval);
        
        countdownInterval = setInterval(() => {
            const now = Date.now();
            const then = timestamp * 1000;
            const diff = then - now;

            if (diff <= 0) {
                clearInterval(countdownInterval);
                document.getElementById('days').textContent = '0';
                document.getElementById('hours').textContent = '0';
                document.getElementById('minutes').textContent = '0';
                document.getElementById('seconds').textContent = '0';
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / 1000 / 60) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
        }, 1000);

        // Первый расчёт
        const now = Date.now();
        const then = timestamp * 1000;
        const diff = then - now;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / 1000 / 60) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById('days').textContent = days;
        document.getElementById('hours').textContent = hours;
        document.getElementById('minutes').textContent = minutes;
        document.getElementById('seconds').textContent = seconds;
    }

    function openVPN() {
        const pwd = document.getElementById('password').value;
        if (!pwd) {
            showError('ВВЕДИ КЛЮЧ ДОСТУПА');
            return;
        }

        const hash = CryptoJS.SHA256(pwd).toString();
        const config = passwords[hash];

        if (!config) {
            showError('НЕВЕРНЫЙ КЛЮЧ');
            document.getElementById('password').value = '';
            return;
        }

        const loader = document.getElementById('loader');
        loader.classList.add('show');

        setTimeout(() => {
            // Скрываем экран входа
            document.getElementById('loginScreen').classList.add('hidden');
            
            // Показываем профиль
            const profileScreen = document.getElementById('profileScreen');
            profileScreen.classList.add('active');

            // Заполняем данные
            document.getElementById('expiryDate').textContent = formatDate(config.expireTimestamp);
            document.getElementById('serversInfo').textContent = config.servers;
            updateCountdown(config.expireTimestamp);

            loader.classList.remove('show');

            // Открываем подписку в Happ
            setTimeout(() => {
                window.location.href = `happ://subscribe?url=${encodeURIComponent(config.url)}`;
            }, 1500);
        }, 1000);
    }

    function logout() {
        if (countdownInterval) clearInterval(countdownInterval);
        
        document.getElementById('profileScreen').classList.remove('active');
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('password').value = '';
        document.getElementById('error').classList.remove('show');
    }

    document.getElementById('password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') openVPN();
    });
</script>
