<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psychosis VPN</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>

<body>

<div class="content">
<div class="container">

<!-- LOGIN -->
<div id="loginScreen">
    <div class="logo">
        <h1>Psychosis VPN</h1>
        <p>Premium Access</p>
    </div>

    <div class="error" id="error"></div>

    <div class="form-group">
        <label>Ключ доступа</label>
        <input type="password" id="password" placeholder="Введите ключ">
    </div>

    <button class="button" onclick="openVPN()">Подключиться</button>
</div>

<!-- PROFILE -->
<div id="profileScreen" style="display:none;">
    <div class="profile-header">
        <div class="profile-avatar">👤</div>
        <h2>Ваш профиль</h2>
    </div>

    <div class="info-card">
        <div class="info-label">Статус</div>
        <div class="info-value status-active">Активен</div>
    </div>

    <div class="info-card">
        <div class="info-label">Подписка до</div>
        <div class="info-value" id="expiryDate"></div>
    </div>

    <div class="info-card">
        <div class="info-label">Серверы</div>
        <div class="info-value" id="serversInfo"></div>
    </div>

    <div class="info-card">
        <div class="info-label">Осталось времени</div>
        <div class="countdown-items big">
            <div class="countdown-item"><span id="days" class="big-num"></span><span class="countdown-label">дни</span></div>
            <div class="countdown-item"><span id="hours" class="big-num"></span><span class="countdown-label">часы</span></div>
            <div class="countdown-item"><span id="minutes" class="big-num"></span><span class="countdown-label">мин</span></div>
            <div class="countdown-item"><span id="seconds" class="big-num"></span><span class="countdown-label">сек</span></div>
        </div>
    </div>

    <div class="small-buttons">
        <button class="small-btn" onclick="openV2ray()">V2rayTun</button>
        <button class="small-btn" onclick="openHapp()">Happ</button>
        <button class="small-btn" onclick="copySub()">Скопировать</button>
        <button class="small-btn" onclick="openSub()">Открыть</button>
    </div>

    <button class="button button-logout" onclick="logout()">Выйти</button>
</div>

</div>
</div>

<script>

// ===== ПОДПИСКИ =====
const passwords = {
    '9d8f020fdf5d96d55f63e1dcd0fbc4aa4f7ed76452ec607489e00e542eadfe8c': {
        url: 'https://raw.githubusercontent.com/aure1337/krutostvpn/main/test77',
        servers: 3
    },
    '6417d118af2071c929a4232db38fa0ecf58932845343b5e986ae407cb908211e': {
        url: 'https://raw.githubusercontent.com/aure1337/krutostvpn/main/test22',
        servers: 3
    }
};

let currentSubUrl;
let countdownInterval;

// ===== LOGIN =====
async function openVPN() {
    const pwd = password.value;
    if (!pwd) return showError('Введите ключ');

    const hash = CryptoJS.SHA256(pwd).toString();
    const config = passwords[hash];

    if (!config) return showError('Неверный ключ');

    try {
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(config.url);

        const res = await fetch(proxyUrl);

        if (!res.ok) {
            return showError('Ссылка не открывается');
        }

        const text = await res.text();

        console.log("SUB DATA:", text); // 👉 смотри в консоли

        const match = text.match(/expire=(\d+)/);

        if (!match) {
            return showError('Нет expire в подписке');
        }

        const expire = parseInt(match[1]);

        loginScreen.style.display = 'none';
        profileScreen.style.display = 'block';

        expiryDate.textContent = new Date(expire * 1000).toLocaleDateString('ru-RU');
        serversInfo.textContent = config.servers;

        currentSubUrl = config.url;

        startCountdown(expire);

    } catch (err) {
        console.error(err);
        showError('Ошибка загрузки (proxy)');
    }
}

// ===== COUNTDOWN =====
function startCountdown(ts) {
    clearInterval(countdownInterval);

    countdownInterval = setInterval(() => {
        const diff = ts * 1000 - Date.now();

        if (diff <= 0) return;

        days.textContent = Math.floor(diff / 86400000);
        hours.textContent = Math.floor(diff / 3600000) % 24;
        minutes.textContent = Math.floor(diff / 60000) % 60;
        seconds.textContent = Math.floor(diff / 1000) % 60;
    }, 1000);
}

// ===== КНОПКИ =====
function openV2ray() {
    location.href = `v2raytun://import-sub?url=${encodeURIComponent(currentSubUrl)}`;
}

function openHapp() {
    location.href = `happ://install-subscription?url=${encodeURIComponent(currentSubUrl)}`;
}

function copySub() {
    navigator.clipboard.writeText(currentSubUrl);
    alert('Ссылка скопирована');
}

function openSub() {
    window.open(currentSubUrl, '_blank');
}

// ===== UTILS =====
function showError(t) {
    error.textContent = t;
    error.classList.add('show');
}

function logout() {
    location.reload();
}

password.addEventListener('keypress', e => {
    if (e.key === 'Enter') openVPN();
});
</script>

</body>
</html>
